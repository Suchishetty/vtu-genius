<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}VTU Genius{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        :root {
            --brand-navy: #0f172a;
            --brand-slate: #1e293b;
            --brand-blue: #0f4c81;
            --brand-cyan: #38bdf8;
            --brand-gold: #f59e0b;
            --surface: #f8fafc;
            --surface-card: rgba(255, 255, 255, 0.9);
            --text-main: #0f172a;
            --text-soft: #64748b;
            --border-soft: rgba(148, 163, 184, 0.2);
        }

        body {
            font-family: 'Manrope', sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 28%),
                linear-gradient(180deg, #eef6ff 0%, #f8fafc 45%, #ffffff 100%);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.92) !important;
            backdrop-filter: blur(16px);
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.18);
        }

        .navbar-brand,
        .nav-link {
            color: #f8fafc !important;
        }

        .nav-link {
            opacity: 0.85;
        }

        .nav-link:hover,
        .nav-link:focus {
            opacity: 1;
        }

        .nav-link.active {
            opacity: 1;
            font-weight: 700;
            color: #ffffff !important;
        }

        .navbar .btn-outline-light.active,
        .navbar .btn-warning.active {
            box-shadow: 0 0 0 0.2rem rgba(255, 255, 255, 0.12);
        }

        .hero-section {
            padding-top: 5rem;
            padding-bottom: 5rem;
            background:
                linear-gradient(135deg, rgba(15, 23, 42, 0.96), rgba(15, 76, 129, 0.92)),
                radial-gradient(circle at top right, rgba(56, 189, 248, 0.25), transparent 30%);
            position: relative;
            overflow: hidden;
        }

        .hero-section::after {
            content: "";
            position: absolute;
            inset: auto -120px -120px auto;
            width: 320px;
            height: 320px;
            background: rgba(245, 158, 11, 0.12);
            border-radius: 50%;
            filter: blur(10px);
        }

        .eyebrow-badge,
        .section-kicker {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 0.9rem;
            border-radius: 999px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .eyebrow-badge {
            background: rgba(255, 255, 255, 0.12);
            color: #e0f2fe;
            border: 1px solid rgba(255, 255, 255, 0.16);
        }

        .hero-copy,
        .feature-card p,
        .mini-feature p {
            font-size: 1rem;
            line-height: 1.7;
        }

        .hero-panel {
            position: relative;
        }

        .panel-card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(241, 245, 249, 0.92));
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 1.75rem;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.2);
            padding: 2rem;
        }

        .panel-label {
            color: var(--brand-blue);
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .panel-metric {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .metric-number {
            font-size: clamp(2.5rem, 4vw, 4rem);
            font-weight: 800;
            color: var(--brand-navy);
            line-height: 1;
        }

        .metric-copy {
            color: var(--text-soft);
            font-size: 1rem;
        }

        .mini-feature,
        .feature-card {
            background: var(--surface-card);
            border: 1px solid var(--border-soft);
            border-radius: 1.25rem;
            padding: 1.5rem;
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.06);
        }

        .mini-feature h3,
        .feature-card h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .features-section {
            padding-top: 5rem;
            padding-bottom: 5rem;
        }

        .section-heading {
            max-width: 42rem;
        }

        .section-kicker {
            background: rgba(15, 76, 129, 0.08);
            color: var(--brand-blue);
            margin-bottom: 1rem;
        }

        .feature-icon {
            width: 3rem;
            height: 3rem;
            border-radius: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--brand-blue), var(--brand-cyan));
            color: #fff;
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 0.05em;
        }

        .feature-card:hover,
        .mini-feature:hover {
            transform: translateY(-4px);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.12);
        }

        .py-lg-6 {
            padding-top: 6rem !important;
            padding-bottom: 6rem !important;
        }

        @media (max-width: 991.98px) {
            .hero-section {
                padding-top: 4rem;
                padding-bottom: 4rem;
            }
        }
    </style>
</head>
<body class="{% block body_class %}{% endblock %}">
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="{% url 'accounts:home' %}">VTU Genius</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                {% if request.user.is_authenticated %}
                    <li class="nav-item">
                        <a
                            class="nav-link{% if request.resolver_match.namespace == 'dashboard' %} active{% endif %}"
                            {% if request.resolver_match.namespace == 'dashboard' %}aria-current="page"{% endif %}
                            href="{% url 'dashboard:dashboard_home' %}"
                        >
                            Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a
                            class="nav-link{% if request.resolver_match.namespace == 'accounts' and request.resolver_match.url_name == 'profile' %} active{% endif %}"
                            {% if request.resolver_match.namespace == 'accounts' and request.resolver_match.url_name == 'profile' %}aria-current="page"{% endif %}
                            href="{% url 'accounts:profile' %}"
                        >
                            Profile
                        </a>
                    </li>
                    <li class="nav-item">
                        <a
                            class="nav-link{% if request.resolver_match.namespace == 'accounts' and request.resolver_match.url_name == 'logout' %} active{% endif %}"
                            {% if request.resolver_match.namespace == 'accounts' and request.resolver_match.url_name == 'logout' %}aria-current="page"{% endif %}
                            href="{% url 'accounts:logout' %}"
                        >
                            Logout
                        </a>
                    </li>
                {% else %}
                    <li class="nav-item">
                        <a
                            class="nav-link{% if request.resolver_match.namespace == 'accounts' and request.resolver_match.url_name == 'home' %} active{% endif %}"
                            {% if request.resolver_match.namespace == 'accounts' and request.resolver_match.url_name == 'home' %}aria-current="page"{% endif %}
                            href="{% url 'accounts:home' %}"
                        >
                            Home
                        </a>
                    </li>
                {% endif %}
            </ul>
            <div class="d-flex gap-2">
                {% if request.user.is_authenticated %}
                    <a
                        href="{% url 'dashboard:dashboard_home' %}"
                        class="btn btn-outline-light btn-sm{% if request.resolver_match.namespace == 'dashboard' %} active{% endif %}"
                    >
                        Dashboard
                    </a>
                    <a
                        href="{% url 'accounts:profile' %}"
                        class="btn btn-warning btn-sm fw-semibold{% if request.resolver_match.namespace == 'accounts' and request.resolver_match.url_name == 'profile' %} active{% endif %}"
                    >
                        Profile
                    </a>
                {% else %}
                    <a
                        href="{% url 'accounts:login' %}"
                        class="btn btn-outline-light btn-sm{% if request.resolver_match.namespace == 'accounts' and request.resolver_match.url_name == 'login' %} active{% endif %}"
                    >
                        Login
                    </a>
                    <a
                        href="{% url 'accounts:register' %}"
                        class="btn btn-warning btn-sm fw-semibold{% if request.resolver_match.namespace == 'accounts' and request.resolver_match.url_name == 'register' %} active{% endif %}"
                    >
                        Register
                    </a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>
<main>
    {% block content %}
    {% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
